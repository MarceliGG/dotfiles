monitor=eDP-1,1920x1080@60,0x0,1
monitorv2 {
  output = DP-1
  mode = 3440x1440@240
  position = 0x0
  scale = 1
  supports_wide_color = 1
  supports_hdr = 1
}
monitor=,preferred,auto,auto

# Enviroment 
env = EDITOR,helix
env = ADW_DISABLE_PORTAL,1
env = QT_QPA_PLATFORMTHEME,qt5ct

input {
  kb_layout = pl
  kb_options = caps:escape,altwin:swap_lalt_lwin
  numlock_by_default = true
  accel_profile = flat

  follow_mouse = 1

  touchpad {
    natural_scroll = true
    disable_while_typing = false
  }

  sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
  gaps_in = 0
  gaps_out = 0
  border_size = 2
  col.active_border = rgba(4499c2ff) rgba(049450ff) 45deg
  col.inactive_border = rgba(404040ff)

  layout = master
}


decoration {
    
    rounding = 0

    blur {
        size = 3
        passes = 2
        xray = yes
        noise = 0
        popups = true
    }

    shadow {
        range = 15
        render_power = 2
    }
}

animations {
  # enabled = false
  bezier = overshoot, 0.05, 0.9, 0.1, 1.1
  animation = windowsIn, 1, 4, overshoot, gnomed
  animation = windowsMove, 1, 3, default,
  animation = windowsOut, 1, 8, default, popin 60%
  animation = fade, 1, 4, default
  animation = fadeOut, 1, 8, default
  animation = border, 0
  animation = workspaces, 1, 3, default, slidefadevert 100%
}

dwindle {
    force_split = 2
}

master {
  mfact = 0.5
}

gestures {
  workspace_swipe_use_r = true
}

gesture = 3, vertical, workspace

# RULES
workspace = w[v1], border:0
workspace = name:dwindle, layout:dwindle
workspace = name:scrolling, layout:scrolling

windowrule = match:float false, no_shadow true

bind = SUPER, A, exec, ~/.config/hypr/setLayout.sh
bind = SUPER, S, exec, ~/.config/hypr/setLayout.sh scrolling
bind = SUPER, D, exec, ~/.config/hypr/setLayout.sh dwindle

misc {
  font_family = inter
  vrr = 0
  vfr = true
  disable_hyprland_logo = true
} 

experimental {
  # xx_color_management_v4 = true
}

cursor {
  inactive_timeout = 2
}

debug {
  # overlay = yes
}

# AUTOSTART
exec-once = /usr/lib/hyprpolkitagent/hyprpolkitagent
exec-once = swww-daemon
exec-once = hypridle
exec-once = hyprctl setcursor Bibata-Modern-Ice 24
exec-once = qs
exec-once = /usr/lib/xdg-desktop-portal-hyprland

# KEYBINDS
bind = SUPER_SHIFT, Q, killactive 
bind = SUPER, T, togglefloating, 
# bind = SUPER, P, pseudo, # dwindle
# bind = SUPER, N, togglesplit, # dwindle
bind = SUPER_SHIFT, Escape, exec, loginctl lock-session
bind = SUPER, F, fullscreen
# bindl = SUPER, M, dpms, toggle

# Screenshots
bind = , PRINT, exec, flameshot gui

# Launch apps
bind = SUPER, X, exec, alacritty
bind = SUPER, B, exec, librewolf
bind = SUPER, E, exec, pcmanfm-qt -style kvantum
bind = SUPER, C, exec, emacsclient -c

bind = SUPER, R, exec, rofi -show-icons -show

# Move focus
bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d

# Scroller binds
bind = SUPER, N, layoutmsg, promote

# Move windows
bind = SUPER_SHIFT, H, movewindow, l
bind = SUPER_SHIFT, L, movewindow, r
bind = SUPER_SHIFT, K, movewindow, u
bind = SUPER_SHIFT, J, movewindow, d

binde = SUPER_CTRL, L, resizeactive, 10 0
binde = SUPER_CTRL, H, resizeactive, -10 0
binde = SUPER_CTRL, K, resizeactive, 0 -10
binde = SUPER_CTRL, J, resizeactive, 0 10

# Switch workspaces with SUPER + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move active window to a workspace with SUPER + SHIFT + [0-9]
bind = SUPER SHIFT, 1, movetoworkspacesilent, 1
bind = SUPER SHIFT, 2, movetoworkspacesilent, 2
bind = SUPER SHIFT, 3, movetoworkspacesilent, 3
bind = SUPER SHIFT, 4, movetoworkspacesilent, 4
bind = SUPER SHIFT, 5, movetoworkspacesilent, 5
bind = SUPER SHIFT, 6, movetoworkspacesilent, 6
bind = SUPER SHIFT, 7, movetoworkspacesilent, 7
bind = SUPER SHIFT, 8, movetoworkspacesilent, 8
bind = SUPER SHIFT, 9, movetoworkspacesilent, 9
bind = SUPER SHIFT, 0, movetoworkspacesilent, 10

# Scroll through existing workspaces with SUPER + scroll
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# Move/resize windows with SUPER + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Other
bind = SUPER_SHIFT, T, workspaceopt, allfloat

# Function keys
binde = ,XF86AudioLowerVolume, exec, qs ipc call osd volDown
binde = ,XF86AudioRaiseVolume, exec, qs ipc call osd volUp
bind = ,XF86AudioMute, exec, qs ipc call osd toggleMute
bind = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle

bind = SUPER, comma, layoutmsg, mfact -0.05
bind = SUPER, period, layoutmsg, mfact +0.05
bind = SUPER, comma, layoutmsg, swapcol l
bind = SUPER, period, layoutmsg, swapcol r

ecosystem {
  no_update_news = true
  no_donation_nag = true
}
